# NetProbe 一键部署
# 用法: docker compose up -d
# 访问: http://localhost:8000

services:
  postgres:
    image: postgres:16-alpine
    container_name: netprobe-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: netprobe
      POSTGRES_PASSWORD: netprobe123
      POSTGRES_DB: netprobe
      TZ: Asia/Shanghai
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netprobe"]
      interval: 5s
      timeout: 3s
      retries: 5

  netprobe:
    build: .
    image: netprobe:latest
    container_name: netprobe
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      # 数据持久化：配置 + 截图（DB 已迁到 PostgreSQL）
      - ./data:/app/data
      # 扫描报告输出（可选）
      - ./output:/app/output
      # nuclei 模板持久化（避免重启重新下载）
      - nuclei-templates:/root/nuclei-templates
    environment:
      TZ: Asia/Shanghai
      DATABASE_URL: postgresql://netprobe:netprobe123@postgres:5432/netprobe
      # 情报源 API Keys（也可在 UI 设置页配置，二选一）
      # FOFA_EMAIL: ""
      # FOFA_KEY: ""
      # HUNTER_KEY: ""
      # NVD_API_KEY: ""
      # SHODAN_API_KEY: ""
    # 扫描工具（nmap SYN 扫描/masscan）需要额外网络权限
    # 如需 SYN 扫描，取消下行注释：
    # cap_add:
    #   - NET_RAW

volumes:
  pg-data:
  nuclei-templates:
