name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── Python 后端 lint + 测试 ─────────────────────────
  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r server/requirements.txt
          pip install ruff

      - name: Syntax check (all Python files)
        run: |
          find netprobe/ server/ scripts/ -name '*.py' -exec python -m py_compile {} +
          echo "✓ All Python files compile"

      - name: Lint (ruff)
        run: ruff check netprobe/ server/ --select E9,F63,F7,F82 --ignore F401 || true
        continue-on-error: true

      - name: Import check (core modules)
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from netprobe.plugins.registry import get_all_plugins
          plugins = get_all_plugins()
          print(f'✓ {len(plugins)} plugins registered')
          assert len(plugins) >= 10, 'Too few plugins'
          "

  # ── 前端构建检查 ─────────────────────────────────────
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: TypeScript check
        run: cd frontend && npx vue-tsc --noEmit || true
        continue-on-error: true

      - name: Build
        run: cd frontend && npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── Docker 镜像构建（仅 tag 触发）─────────────────────
  docker-build:
    needs: [backend-check, frontend-check]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
